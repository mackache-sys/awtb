      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const blobUrls = {};

to<\u002Fspan> ready so we get your name &amp; passport number exactly right.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ STATS BAND ============ -->\n  <section style=\"background:#F4EFE6; border-bottom:1px solid #e9e2d3;\">\n    <div class=\"stats-grid\" style=\"max-width:1200px; margin:0 auto; padding:26px 28px; display:grid; grid-template-columns:repeat(4,1fr); gap:24px;\">\n      <div style=\"text-align:center;\"><div style=\"font:700 28px/1 'Space Grotesk', sans-serif; color:#16243B;\">1999<\u002Fdiv><div style=\"font:600 11px/1.4 Archivo, sans-serif; color:#9a8c6c; margin-top:6px; letter-spacing:.04em;\">ESTABLISHED<\u002Fdiv><\u002Fdiv>\n      <div style=\"text-align:center; border-left:1px solid #e3d9c3;\"><div style=\"font:700 28px/1 'Space Grotesk', sans-serif; color:#16243B;\">IATA<\u002Fdiv><div style=\"font:600 11px/1.4 Archivo, sans-serif; color:#9a8c6c; margin-top:6px; letter-spacing:.04em;\">ACCREDITED AGENT<\u002Fdiv><\u002Fdiv>\n      <div style=\"text-align:center; border-left:1px solid #e3d9c3;\"><div style=\"font:700 28px/1 'Space Grotesk', sans-serif; color:#16243B;\">2<\u002Fdiv><div style=\"font:600 11px/1.4 Archivo, sans-serif; color:#9a8c6c; margin-top:6px; letter-spacing:.04em;\">OFFICES · NP &amp; JP<\u002Fdiv><\u002Fdiv>\n      <div style=\"text-align:center; border-left:1px solid #e3d9c3;\"><div style=\"font:700 28px/1 'Space Grotesk', sans-serif; color:#16243B;\">10–6 / 10–8<\u002Fdiv><div style=\"font:600 11px/1.4 Archivo, sans-serif; color:#9a8c6c; margin-top:6px; letter-spacing:.04em;\">NEPAL · JAPAN HOURS<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ HOW IT WORKS ============ -->\n  <section style=\"max-width:1200px; margin:0 auto; padding:84px 28px 30px;\">\n    <div>\n      <div style=\"font:700 11px/1 'Space Mono', monospace; letter-spacing:.2em; color:#C9A24B;\">HOW IT WORKS<\u002Fdiv>\n      <h2 style=\"font:600 36px/1.1 'Space
