  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 <\u002Fdiv>\n  <\u002Fheader>\n\n  <span id=\"top\"><\u002Fspan>\n\n  <!-- ============ HERO ============ -->\n  <section style=\"background:#16243B; position:relative; overflow:hidden;\">\n    <div style=\"position:absolute; inset:0; opacity:.5; background:radial-gradient(900px 380px at 78% -8%, rgba(201,162,75,.16), transparent 60%);\"><\u002Fdiv>\n    <div style=\"max-width:1200px; margin:0 auto; padding:74px 28px 84px; position:relative; display:grid; grid-template-columns:1.05fr .95fr; gap:56px; align-items:center;\">\n      <!-- copy -->\n      <div>\n        <div style=\"display:inline-flex; align-items:center; gap:10px; border:1px solid rgba(201,162,75,.4); border-radius:30px; padding:7px 15px;\">\n          <span style=\"font:700 10px/1 'Space Mono', monospace; letter-spacing:.18em; color:#C9A24B;\">ALL WIDE TRAVEL BUREAU<\u002Fspan>\n          <span style=\"width:4px; height:4px; border-radius:50%; background:rgba(244,239,230,.4);\"><\u002Fspan>\n          <span style=\"font:400 10px/1 'Space Mono', monospace; letter-spacing:.14em; color:rgba(244,239,230,.7);\">EST 1999<\u002Fspan>\n        <\u002Fdiv>\n        <h1 style=\"font:600 52px/1.06 'Space Grotesk', sans-serif; color:#F4EFE6; margin:24px 0 0; letter-spacing:-.02em;\">Your seat to the world,<br>booked over a <span style=\"color:#C9A24B;\">chat<\u002Fspan>.<\u002Fh1>\n        <p style=\"font:400 17px/1.65 Archivo, sans-serif; color:rgba(244,239,230,.82); margin:22px 0 0; max-width:480px;\">Tell us where you're headed and we'll find the fare — a real person, on WhatsApp, the way it's worked since 1999. Domestic &amp; international air ticketing from Pokhara, Nepal and Japan.<\u002Fp>\n        <div style=\"display:flex; flex-wrap:wrap; gap:10px; margin-top:30px;\">\n          <div style=\"display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.06); border:1px solid rgba(244,239,230,.14); border-radius:8px; padding:9px 13px; font:600 11px/1 Archivo, sans-serif; color:#F4EFE6;\"><span style=\"color:#C9A24B;\">✓<\u002Fspan> 25+ years<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.06); border:1px solid rgba(244,239,230,.14); border-radius:8px; padding:9px 13px; font:600 11px/1 Archivo, sans-serif; color:#F4EFE6;\"><span style=\"color:#C9A24B;\">✓<\u002Fspan> IATA accredited<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.06); border:1px solid rgba(244,239,230,.14); border-radius:8px; padding:9px 13px; font:600 11px/1 Archivo, sans-serif; color:#F4EFE6;\"><span style=\"color:#C9A24B;\">✓<\u002Fspan> Amadeus GDS<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.06); border:1px solid rgba(244,239,230,.14); border-radius:8px; padding:9px 13px; font:600 11px/1 Archivo, sans-serif; color:#F4EFE6;\"><span style=\"color:#C9A24B;\">✓<\u002Fspan> Nepal &amp; Japan desks<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- booking pass -->\n      <div id=\"book\" style=\"background:#fff; border-radius:18px; box-shadow:0 30px 70px rgba(0,0,0,.36); overflow:hidden;\">\n        <div style=\"background:#16243B; padding:18px 24px; display:flex; align-items:center; justify-content:space-between; border-bottom:2px dashed rgba(201,162,75,.5);\">\n          <div style=\"display:flex; align-items:center; gap:11px;\">\n            <img src=\"e011b048-a63a-48bc-8edd-05acaf44b76c\" alt=\"AWTB\" style=\"display:block; width:74px; height:auto;\">\n            <div style=\"font:700 9px/1.3 'Space Mono', monospace; letter-spacing:.16em; color:#C9A24B;\">BOOK YOUR<br>FLIGHT<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font:700 10px/1 'Space Mono', monospace; color:rgba(244,239,230,.6);\">AW·1999<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:22px 24px 26px;\">\n          <!-- trip toggle -->\n          <div style=\"display:flex; gap:8px; background:#F1F3F6; border-radius:10px; padding:4px;\">\n            <button onclick=\"{{ setOneway }}\" style=\"{{ onewayBtn }}\">One way<\u002Fbutton>\n            <button onclick=\"{{ setRound }}\" style=\"{{ roundBtn }}\">Round trip<\u002Fbutton>\n          <\u002Fdiv>\n          <!-- from / to -->\n          <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px;\">\n            <div>\n              <label style=\"font:700 9px/1 'Space Mono', monospace; letter-spacing:.14em; color:#9aa1ab;\">FROM<\u002Flabel>\n              <input value=\"{{ from }}\" onchange=\"{{ onFrom }}\" placeholder=\"Kathmandu (KTM)\" style=\"width:100%; margin-top:7px; padding:11px 12px; border:1px solid #e2e6ea; border-radius:8px; font-size:13px; color:#16243B;\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"font:700 9px/1 'Space Mono', monospace; letter-spacing:.14em; color:#9aa1ab;\">TO<\u002Flabel>\n              <input value=\"{{ to }}\" onchange=\"{{ onTo }}\" placeholder=\"Dubai (DXB)\" style=\"width:100%; margin-top:7px; padding:11px 12px; border:1px solid #e2e6ea; border-radius:8px; font-size:13px; color:#16243B;\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- dates -->\n          <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:13px;\">\n            <div>\n              <label style=\"font:700 9px/1 'Space Mono', monospace; letter-spacing:.14em; color:#9aa1ab;\">DEPART<\u002Flabel>\n              <input type=\"date\" value=\"{{ depart }}\" onchange=\"{{ onDepart }}\" style=\"width:100%; margin-top:7px; padding:10px 12px; border:1px solid #e2e6ea; border-radius:8px; font-size:13px; color:#16243B;\">\n            <\u002Fdiv>\n            <div style=\"{{ retWrap }}\">\n              <label style=\"font:700 9px/1 'Space Mono', monospace; letter-spacing:.14em; color:#9aa1ab;\">RETURN<\u002Flabel>\n              <input type=\"date\" value=\"{{ ret }}\" onchange=\"{{ onRet }}\" style=\"width:100%; margin-top:7px; padding:10px 12px; border:1px solid #e2e6ea; border-radius:8px; font-size:13px; color:#16243B;\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- pax + office -->\n          <div style=\"display:grid; grid-template-columns:1fr 1.3fr; gap:12px; margin-top:13px;\">\n            <div>\n              <label style=\"font:700 9px/1 'Space Mono', monospace; letter-spacing:.14em; color:#9aa1ab;\">PASSENGERS<\u002Flabel>\n              <select value=\"{{ pax }}\" onchange=\"{{ onPax }}\" style=\"width:100%; margin-top:7px; padding:11px 12px; border:1px solid #e2e6ea; border-radius:8px; font-size:13px; color:#16243B; background:#fff;\">\n                <option value=\"1\">1 traveller<\u002Foption>\n                <option value=\"2\">2 travellers<\u002Foption>\n                <option value=\"3\">3 travellers<\u002Foption>\n                <option value=\"4\">4 travellers<\u002Foption>\n                <option value=\"5\">5+ travellers<\u002Foption>\n              <\u002Fselect>\n            <\u002Fdiv>\n            <div>\n              <label style=\"font:700 9px/1 'Space Mono', monospace; letter-spacing:.14em; color:#9aa1ab;\">BOOKING DESK<\u002Flabel>\n              <div style=\"display:flex; gap:7px; margin-top:7px;\">\n                <button onclick=\"{{ setNepal }}\" style=\"{{ nepalBtn }}\">🇳🇵 Nepal<\u002Fbutton>\n                <button onclick=\"{{ setJapan }}\" style=\"{{ japanBtn }}\">🇯🇵 Japan<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- submit -->\n          <button onclick=\"{{ book }}\" class=\"ghover\" style=\"width:100%; margin-top:20px; background:#25D366; color:#073B23; border:none; border-radius:10px; padding:15px; font:700 15px/1 Archivo, sans-serif; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;\">\n            <svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"#073B23\"><path d=\"M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75. d #e3d9c3;\"><div style=\"font:700 28px/1 'Space Grotesk', sans-serif; color:#16243B;\">2<\u002Fdiv><div style=\"font:600 11px/1.4 Archivo, sans-serif; color:#9a8c6c; margin-top:6px; letter-spacing:.04em;\">OFFICES · NP &amp; JP<\u002Fdiv><\u002Fdiv>\n      <div style=\"text-align:center; border-left:1px solid #e3d9c3;\"><div style=\"font:700 28px/1 'Space Grotesk', sans-serif; color:#16243B;\">10–6 / 10–8<\u002Fdiv><div style=\"font:600 11px/1.4 Archivo, sans-serif; color:#9a8c6c; margin-top:6px; letter-spacing:.04em;\">NEPAL · JAPAN HOURS<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ HOW IT WORKS ============ -->\n  <section style=\"max-width:1200px; margin:0 auto; padding:84px 28px 30px;\">\n    <div>\n      <div style=\"font:700 11px/1 'Space Mono', monospace; letter-spacing:.2em; color:#C9A24B;\">HOW IT WORKS<\u002Fdiv>\n      <h2 style=\"font:600 36px/1.1 'Space Grotesk', sans-serif; color:#16243B; margin:14px 0 0; letter-spacing:-.01em;\">Booked in three messages<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:24px; margin-top:46px;\">\n      <div style=\"background:#fff; border:1px solid #ececec; border-radius:14px; padding:30px 26px;\">\n        <div style=\"width:46px; height:46px; border-radius:11px; background:#16243B; color:#C9A24B; display:flex; align-items:center; justify-content:center; font:700 18px/1 'Space Mono', monospace;\">01<\u002Fdiv>\n        <h3 style=\"font:600 19px/1.3 'Space Grotesk', sans-serif; color:#16243B; margin:20px 0 0;\">Tell us your route<\u002Fh3>\n        <p style=\"font:400 14px/1.65 Archivo, sans-serif; color:#6a727c; margin:10px 0 0;\">Fill the few fields above, or just message us where and when. The chat opens pre-filled with your trip.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fff; border:1px solid #ececec; border-radius:14px; padding:30px 26px;\">\n        <div style=\"width:46px; height:46px; border-radius:11px; bac
